<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/icon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/public/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Step Sequencer</title>
    <meta name="description" content="Professional 4x4 Step Sequencer with MIDI Output and Audio Synthesis">
    <meta name="author" content="Step Sequencer App">
    
    <!-- Allow Web MIDI and Web Audio APIs -->
    <meta http-equiv="Permissions-Policy" content="midi=*">
    
    <style>
      /* Prevent flash of unstyled content */
      body { 
        margin: 0; 
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      
      /* Loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      
      .loading-content {
        text-align: center;
        color: #333;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f0f0f0;
        border-top: 3px solid #333;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .dark #loading-screen {
        background: #1a1a1a;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div>Loading Step Sequencer...</div>
        <div style="font-size: 0.8em; margin-top: 8px; opacity: 0.7;">
          Initializing MIDI and Audio Systems
        </div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/main.tsx"></script>
    
    <script>
      // Hide loading screen when React app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 300);
          }
        }, 1000); // Give React app time to initialize
      });
      
      // Global functions for Electron menu integration
      window.resetSequencer = () => {
        // This will be called from Electron menu
        window.location.reload();
      };
      
      window.stopSequencer = () => {
        // Trigger spacebar to stop sequencer
        window.dispatchEvent(new KeyboardEvent('keydown', { code: 'Space' }));
      };
    </script>
  </body>
</html>
